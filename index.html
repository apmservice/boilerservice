<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Boiler_Service</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#e6eaee;font-family:Calibri,Arial,sans-serif;color:#111}
:root{--g:#21a366;--r:#d9534f;--y:#f0ad4e;--b:#1565c0}
.app{display:flex;flex-direction:column;width:100%;height:100vh}
.zone{
  flex:1;
  overflow-y:auto;
  background:#eef1f4;
  padding-bottom:calc(140px + env(safe-area-inset-bottom, 0px));
}
.pg{display:none;padding:14px;background:#fff;min-height:100%}
.pg.on{display:block}
.data-bar{display:flex;gap:4px;padding:6px 10px;background:#f0f4f8;border-bottom:1px solid #dde4ea;flex-wrap:wrap;align-items:center}
.data-bar-title{font-size:10px;color:#888;font-weight:700;flex:1;min-width:90px}
.dbar-select{height:26px;padding:4px 8px;border:1px solid #cfd8e3;border-radius:7px;font-size:10px;font-weight:700;background:#fff;color:#333;min-width:190px;max-width:280px;outline:none}
.dbar-select:focus{border-color:var(--g)}
.sync-pill{padding:4px 8px;border-radius:999px;font-size:9px;font-weight:700;display:flex;align-items:center;gap:5px;white-space:nowrap;background:#eef2f6;color:#667085;border:1px solid #d0d7de;min-height:24px}
.sync-pill::before{content:"☁️"}
.sync-pill.ok{background:#e8f7ee;color:#177245;border-color:#b9e2c6}
.sync-pill.go{background:#fff4db;color:#9a6700;border-color:#f3d08b}
.sync-pill.warn{background:#f5f5f5;color:#666;border-color:#ddd}
.sync-pill.err{background:#fdecec;color:#b42318;border-color:#f3b7b7}
.dbar-btn{padding:4px 8px;border-radius:7px;border:none;font-size:8px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:3px;white-space:nowrap;min-height:24px;line-height:1}
.dbar-btn:active{opacity:.7}
.db-exp{background:#1565c0;color:#fff}
.db-imp{background:#21a366;color:#fff}
.db-clear{background:#d9534f;color:#fff}
.htitle{font-size:18px;font-weight:700;color:var(--g)}
.hsub{font-size:12px;color:#999;margin-bottom:12px}
.sbox{background:#f4f8f4;border:1px solid #c3e0cc;border-radius:10px;padding:14px;margin-bottom:12px}
.sbox h3{margin:0 0 8px;font-size:14px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #eee;font-size:13px;gap:8px}
.srow:last-child{border-bottom:none}
.srow-left{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.srow-name{font-weight:700;font-size:13px;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.srow-loc{font-size:11px;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bge{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.bge.p{background:var(--g)}.bge.f{background:var(--r)}.bge.w{background:#aaa}
.fs{margin-bottom:11px}
.fl{font-size:12px;color:#555;font-weight:700;margin-bottom:3px;display:block}
.fi,.ft{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;outline:none}
.fi:focus,.ft:focus{border-color:var(--g)}
.ft{resize:vertical;min-height:65px}
.fr{display:flex;gap:8px}.fr .fs{flex:1}
.rg{display:flex;gap:8px;margin-top:3px}
.rb{flex:1;padding:10px;border-radius:8px;border:2px solid #ddd;background:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.rb.p.on{background:#d4edda;border-color:var(--g);color:var(--g)}
.rb.f.on{background:#f8d7da;border-color:var(--r);color:var(--r)}
.asbar{display:flex;align-items:center;gap:7px;padding:6px 10px;background:#f8f8f8;border:1px solid #eee;border-radius:8px;margin-bottom:10px;font-size:11px;color:#999}
.asdot{width:8px;height:8px;border-radius:50%;background:#ddd;flex-shrink:0;transition:all .3s}
.asdot.ok{background:var(--g);box-shadow:0 0 0 3px rgba(33,163,102,.18)}
.asdot.go{background:var(--y);animation:blink .5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:5px}
.pcell{position:relative;aspect-ratio:1;border-radius:9px;overflow:hidden;background:#eee}
.pcell img{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in}
.pdel{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.65);color:#fff;border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pedit{position:absolute;bottom:3px;right:3px;width:22px;height:22px;border-radius:50%;background:rgba(33,163,102,.85);color:#fff;border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ══ ปุ่มเพิ่มรูป: กล้อง + แกลเลอรี่ ══ */
.padd-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:7px;
  margin-top:5px;
}
.padd{
  aspect-ratio:1;
  border-radius:9px;
  border:2px dashed #ccc;
  background:#fafafa;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:border .2s, background .2s;
  min-height:72px;
}
.padd:active{border-color:var(--g);background:#f0faf4}
.padd-icon{font-size:28px;pointer-events:none;line-height:1}
.padd-txt{font-size:11px;color:#888;font-weight:700;pointer-events:none;text-align:center;line-height:1.3}
.padd input[type=file]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:0}

.pcnt{font-size:11px;color:#aaa;text-align:right;margin-top:3px}
.pcell-loading{aspect-ratio:1;border-radius:9px;background:linear-gradient(90deg,#e0e0e0 25%,#f0f0f0 50%,#e0e0e0 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;display:flex;align-items:center;justify-content:center}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.arow{
  display:flex;
  gap:6px;
  margin-top:12px;
  margin-bottom:24px;
  flex-wrap:wrap;
  padding:0 2px;
}
.btn{
  padding:13px 10px;
  border-radius:8px;
  border:none;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:4px;
  flex:1;
  justify-content:center;
  transition:opacity .15s;
  min-width:70px;
  min-height:48px;
}
.btn:active{opacity:.7}
.bs{background:var(--g);color:#fff}
.bp{background:var(--b);color:#fff}
.bsh{background:#6c3fc5;color:#fff}
.bc{background:#eee;color:#555;border:1px solid #ccc}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:9px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .25s;z-index:9999;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.on{opacity:1}
.bar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#dfe3e8;
  display:flex;
  z-index:100;
  box-shadow:0 -2px 8px rgba(0,0,0,.1);
  padding-bottom:env(safe-area-inset-bottom, 0px);
  height:calc(58px + env(safe-area-inset-bottom, 0px));
  align-items:flex-start;
}
.twrap{flex:1;overflow-x:auto;scrollbar-width:none;height:58px;}
.twrap::-webkit-scrollbar{display:none}
.tabs{display:flex;gap:3px;padding:0 3px;height:58px;align-items:flex-end}
.tab{min-width:82px;height:42px;display:flex;align-items:center;justify-content:center;background:#e0e0e0;border-radius:7px 7px 0 0;font-weight:700;font-size:12px;cursor:pointer;padding:0 8px;position:relative;transition:background .15s;white-space:nowrap}
.tab.on{border-top:3px solid var(--g);background:#fff}
.tdot{width:7px;height:7px;border-radius:50%;position:absolute;top:5px;right:4px}
.tdot.p{background:var(--g)}.tdot.f{background:var(--r)}
.ibtn{width:42px;height:42px;margin:8px 3px auto;border-radius:50%;border:1px solid #aaa;background:#fff;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ibtn:active{background:#eee}
.lb{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:8000;display:none;flex-direction:column;align-items:center;padding:12px}
.lb.on{display:flex}
.lb-top{width:100%;display:flex;justify-content:space-between;align-items:center;padding-bottom:8px;max-width:700px}
.lb-cnt{color:#aaa;font-size:12px}
.lb-x{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer}
.lb-mid{position:relative;flex:1;width:100%;max-width:700px;display:flex;align-items:center;justify-content:center}
.lb-mid img{max-width:100%;max-height:calc(100vh - 200px);object-fit:contain;border-radius:10px;touch-action:pinch-zoom}
.lb-arr{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:22px;cursor:pointer}
.lb-arr:active{background:rgba(255,255,255,.3)}
.lb-l{left:4px}.lb-r{right:4px}
.lb-strip{display:flex;gap:5px;overflow-x:auto;padding:8px 0;width:100%;max-width:700px;scrollbar-width:none}
.lb-strip::-webkit-scrollbar{display:none}
.lb-th{width:48px;height:48px;border-radius:7px;object-fit:cover;cursor:pointer;opacity:.5;border:2px solid transparent;flex-shrink:0;transition:all .2s}
.lb-th.on{opacity:1;border-color:#fff}
.lb-bot{display:flex;gap:8px;padding-top:8px;width:100%;max-width:700px}
.lb-btn{flex:1;padding:9px;border-radius:20px;border:none;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.lb-cl{background:#fff;color:#111}
.lb-dl{background:var(--g);color:#fff}
.lb-ed{background:var(--b);color:#fff}
.editor{position:fixed;inset:0;background:#111;z-index:9000;display:none;flex-direction:column}
.editor.on{display:flex}
.ed-topbar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:#1a1a1a;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.ed-topbar::-webkit-scrollbar{display:none}
.ed-tool{min-width:38px;height:38px;border-radius:8px;border:2px solid transparent;background:#2a2a2a;color:#eee;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;padding:0 6px;white-space:nowrap}
.ed-tool.on{background:var(--g);border-color:#1a7a4a;color:#fff}
.ed-tool:active{opacity:.7}
.ed-sep{width:1px;height:30px;background:#333;flex-shrink:0;margin:0 3px}
.ed-canvas-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#222;position:relative}
#imageCanvas{position:absolute;max-width:100%;max-height:100%;border-radius:4px;display:block;pointer-events:none}
#annotCanvas{position:absolute;max-width:100%;max-height:100%;border-radius:4px;display:block;touch-action:none;cursor:crosshair}
.ed-botbar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:#1a1a1a;flex-shrink:0}
.ed-color-wrap{display:flex;gap:5px;flex:1;overflow-x:auto;scrollbar-width:none}
.ed-color-wrap::-webkit-scrollbar{display:none}
.ed-color{width:28px;height:28px;border-radius:50%;border:3px solid transparent;cursor:pointer;flex-shrink:0;transition:all .15s}
.ed-color.on{border-color:#fff;transform:scale(1.2)}
.ed-sz-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ed-sz{width:80px;accent-color:var(--g)}
.ed-actbar{display:flex;gap:6px;padding:8px 10px;background:#1a1a1a;flex-shrink:0}
.ed-abtn{flex:1;padding:10px;border-radius:20px;border:none;font-size:13px;font-weight:700;cursor:pointer}
.ed-cancel{background:#333;color:#ccc}
.ed-save{background:var(--g);color:#fff}
.layer-badge{display:flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0;color:#fff;background:#333;border:1px solid #555}
.layer-badge span{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.layer-badge .l-img{background:#1565c0}
.layer-badge .l-ann{background:#21a366}
.sym-picker{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);background:#2a2a2a;border-radius:12px;padding:10px;display:none;flex-wrap:wrap;gap:6px;max-width:300px;box-shadow:0 4px 20px rgba(0,0,0,.6);z-index:10}
.sym-picker.on{display:flex}
.sym-btn{width:36px;height:36px;background:#333;border:none;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sym-btn:active{background:var(--g)}
.txt-overlay{position:absolute;background:transparent;border:2px dashed rgba(255,255,255,.5);border-radius:4px;padding:4px;display:none;pointer-events:all;z-index:20}
#edTxtInput{background:transparent;border:none;outline:none;font-size:20px;font-weight:700;color:#ff3c00;text-shadow:0 1px 3px rgba(0,0,0,.8);min-width:40px;min-height:28px;font-family:Arial,sans-serif;caret-color:#fff;resize:none;overflow:hidden;width:200px}
.loading-cover{position:fixed;inset:0;background:rgba(255,255,255,.9);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.loading-cover.hide{display:none}
.spin{width:40px;height:40px;border:4px solid #eee;border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pdf-progress{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.pdf-progress.on{display:flex}
.pdf-prog-box{background:#fff;border-radius:16px;padding:24px 28px;min-width:280px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.pdf-prog-title{font-size:15px;font-weight:700;color:#222;margin-bottom:10px}
.pdf-prog-sub{font-size:12px;color:#888;margin-bottom:14px;min-height:18px}
.pdf-prog-bar-wrap{background:#eee;border-radius:20px;height:10px;overflow:hidden;margin-bottom:6px}
.pdf-prog-bar{height:100%;background:linear-gradient(90deg,var(--g),#4ade80);border-radius:20px;transition:width .3s;width:0%}
.pdf-prog-pct{font-size:13px;font-weight:700;color:var(--g)}
</style>
</head>
<body>
<div class="loading-cover" id="loadingCover">
  <div class="spin"></div>
  <div style="font-size:14px;color:#555;font-weight:700">กำลังโหลดข้อมูล…</div>
</div>
<script>
window.__loaderFailSafe = true;
(function(){
  function hideLoader(){
    var el = document.getElementById('loadingCover');
    if(el) el.classList.add('hide');
  }
  window.addEventListener('error', hideLoader);
  window.addEventListener('unhandledrejection', hideLoader);
  document.addEventListener('DOMContentLoaded', function(){ setTimeout(hideLoader, 2200); });
  setTimeout(hideLoader, 4000);
})();
</script>
<div class="pdf-progress" id="pdfProgress">
  <div class="pdf-prog-box">
    <div class="pdf-prog-title">📄 กำลังสร้าง PDF รวม…</div>
    <div class="pdf-prog-sub" id="pdfProgSub">เตรียมข้อมูล…</div>
    <div class="pdf-prog-bar-wrap"><div class="pdf-prog-bar" id="pdfProgBar"></div></div>
    <div class="pdf-prog-pct" id="pdfProgPct">0%</div>
  </div>
</div>
<div class="app">
  <div class="data-bar">
    <div class="data-bar-title">💾 ข้อมูลในเครื่อง</div>
    <select id="topCommand" class="dbar-select" onchange="handleTopCommand(this)">
      <option value="">เลือกคำสั่ง…</option>
      <option value="export">📤 Export ข้อมูล</option>
      <option value="import">📥 Import ข้อมูล</option>
      <option value="clearall">🗑️ ล้างข้อมูลทั้งหมด</option>
      
      
      
      
    </select>
    <input type="file" id="impFile" accept=".json" style="display:none" onchange="importData(this)"/>
  </div>
  <div class="zone" id="zone"></div>
  <div class="bar">
    <div class="twrap"><div class="tabs" id="tabs"></div></div>
    <button class="ibtn" id="btnAdd">＋</button>
    <button class="ibtn" id="btnDel">－</button>
  </div>
</div>
<!-- hidden file inputs สำหรับกล้องและแกลเลอรี่ -->
<input type="file" id="inputCamera"  accept="image/*" capture="environment" style="display:none" onchange="handleFilesFromInput(this)"/>
<input type="file" id="inputGallery" accept="image/*" multiple           style="display:none" onchange="handleFilesFromInput(this)"/>

<div class="lb" id="lb">
  <div class="lb-top">
    <div class="lb-cnt" id="lbCnt"></div>
    <button class="lb-x" onclick="lbClose()">✕</button>
  </div>
  <div class="lb-mid">
    <img id="lbImg" src="" alt=""/>
    <button class="lb-arr lb-l" id="lbL" onclick="lbNav(-1)">‹</button>
    <button class="lb-arr lb-r" id="lbR" onclick="lbNav(1)">›</button>
  </div>
  <div class="lb-strip" id="lbStrip"></div>
  <div class="lb-bot">
    <button class="lb-btn lb-cl" onclick="lbClose()">✕ ปิด</button>
    <button class="lb-btn lb-ed" onclick="lbEditCurrent()">✏️ แก้ไขรูป</button>
    <button class="lb-btn lb-dl" onclick="lbDL()">⬇️ บันทึก</button>
  </div>
</div>
<div class="editor" id="editor">
  <div class="ed-topbar">
    <button class="ed-tool on" id="etDraw"   onclick="setTool('draw')"  >✏️</button>
    <button class="ed-tool"   id="etArrow"  onclick="setTool('arrow')" >➡️</button>
    <button class="ed-tool"   id="etRect"   onclick="setTool('rect')"  >⬜</button>
    <button class="ed-tool"   id="etCircle" onclick="setTool('circle')">⭕</button>
    <button class="ed-tool"   id="etLine"   onclick="setTool('line')"  >╱</button>
    <button class="ed-tool"   id="etText"   onclick="setTool('text')"  >T</button>
    <button class="ed-tool"   id="etNum"    onclick="setTool('number')">①</button>
    <button class="ed-tool"   id="etSym"    onclick="toggleSymPicker()">★</button>
    <div class="ed-sep"></div>
    <button class="ed-tool" onclick="edUndo()">↩️</button>
    <button class="ed-tool" onclick="edClearAnnot()">🗑️</button>
    <div class="layer-badge" style="margin-left:4px"><span class="l-img"></span>รูป</div>
    <div class="layer-badge"><span class="l-ann"></span>annot</div>
    <div class="sym-picker" id="symPicker">
      <button class="sym-btn" onclick="setSym('✅')">✅</button>
      <button class="sym-btn" onclick="setSym('❌')">❌</button>
      <button class="sym-btn" onclick="setSym('⚠️')">⚠️</button>
      <button class="sym-btn" onclick="setSym('🔴')">🔴</button>
      <button class="sym-btn" onclick="setSym('🟡')">🟡</button>
      <button class="sym-btn" onclick="setSym('🟢')">🟢</button>
      <button class="sym-btn" onclick="setSym('⭐')">⭐</button>
      <button class="sym-btn" onclick="setSym('📌')">📌</button>
      <button class="sym-btn" onclick="setSym('🔺')">🔺</button>
      <button class="sym-btn" onclick="setSym('🔻')">🔻</button>
      <button class="sym-btn" onclick="setSym('💡')">💡</button>
      <button class="sym-btn" onclick="setSym('🔧')">🔧</button>
    </div>
  </div>
  <div class="ed-canvas-wrap" id="edWrap">
    <canvas id="imageCanvas"></canvas>
    <canvas id="annotCanvas"></canvas>
    <div class="txt-overlay" id="txtOverlay">
      <textarea id="edTxtInput" rows="1"
        oninput="autoResizeTxt(this)" onkeydown="txtKeyDown(event)"></textarea>
    </div>
  </div>
  <div class="ed-botbar">
    <div class="ed-color-wrap" id="edColors"></div>
    <div class="ed-sz-wrap">
      <span style="color:#aaa;font-size:11px">ขนาด</span>
      <input type="range" class="ed-sz" id="edSize" min="2" max="40" value="5"/>
    </div>
  </div>
  <div class="ed-actbar">
    <button class="ed-abtn ed-cancel" onclick="edCancel()">✕ ยกเลิก</button>

const FB_DISABLED = true;
window.handleTopCommand = async function(sel){
 const v = sel && sel.value ? sel.value : '';
 if (!v) return;
 try {
  if (v === 'export') await exportData();
  else if (v === 'import') document.getElementById('impFile').click();
  else if (v === 'clearall') await clearAllSheets();
 } catch (e) {
  console.error(e);
  toast((e && (e.message || e)) || 'เกิดข้อผิดพลาด');
 } finally {
  if (sel) sel.value = '';
 }
};

/* ══ IndexedDB ══ */
let DB=null;
const DB_NAME='scgp_boiler_db',DB_VER=1,STORE='data';
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE,{keyPath:'k'});};
    req.onsuccess=e=>res(e.target.result);
    req.onerror=rej;
  });
}
function dbGet(k){return new Promise((res,rej)=>{const tx=DB.transaction(STORE,'readonly');const req=tx.objectStore(STORE).get(_FID+'::'+k);req.onsuccess=e=>res(e.target.result?.v??null);req.onerror=rej;});}
function dbSet(k,v){return new Promise((res,rej)=>{const tx=DB.transaction(STORE,'readwrite');const req=tx.objectStore(STORE).put({k:_FID+'::'+k,v});req.onsuccess=()=>res(true);req.onerror=rej;});}
function dbDel(k){return new Promise((res,rej)=>{const tx=DB.transaction(STORE,'readwrite');const req=tx.objectStore(STORE).delete(_FID+'::'+k);req.onsuccess=()=>res();req.onerror=rej;});}
function dbGetAll(){return new Promise((res,rej)=>{const tx=DB.transaction(STORE,'readonly');const req=tx.objectStore(STORE).getAll();req.onsuccess=e=>{const prefix=_FID+'::';const map={};(e.target.result||[]).forEach(r=>{if(r.k.startsWith(prefix))map[r.k.slice(prefix.length)]=r.v;});res(map);};req.onerror=rej;});}
async function dbClearAll(){const all=await dbGetAll();for(const k of Object.keys(all))await dbDel(k);}

/* ══ Image resize ══ */
function resizeImage(file,maxPx,q){
  return new Promise((res,rej)=>{
    const r=new FileReader();r.onerror=rej;
    r.onload=ev=>{
      const img=new Image();img.onerror=rej;
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx}else{w=Math.round(w*maxPx/h);h=maxPx}}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q));
      };img.src=ev.target.result;
    };r.readAsDataURL(file);
  });
}
function loadImgAsync(src){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src;});}
async function buildCompositeAsync(iid){
  const imgSrc=await loadImg(iid);if(!imgSrc)return null;
  const annSrc=await loadAnnot(iid);if(!annSrc)return imgSrc;
  try{
    const[ie,ae]=await Promise.all([loadImgAsync(imgSrc),loadImgAsync(annSrc)]);
    const c=document.createElement('canvas');c.width=ie.naturalWidth;c.height=ie.naturalHeight;
    const ctx=c.getContext('2d');ctx.drawImage(ie,0,0);ctx.drawImage(ae,0,0,c.width,c.height);
    return c.toDataURL('image/jpeg',.88);
  }catch(e){return imgSrc;}
}

/* ══════════════════════════════════════════════
   PDF ENGINE v14 — Final
   - content เต็มความกว้าง ชิดบนซ้ายเสมอ
   - รูปจาก IndexedDB (กรองโลโก้ออกแล้ว)
   - หน้า content: รูป ≤ 6 ต่อท้าย หรือหน้าใหม่
   - หน้ารูป: แบ่ง batch ≤ 12 ก่อนเสมอ
              แล้วค่อย calcGrid fit ทีละ batch
   - รูปเกิน → สร้างหน้าเปล่าเพิ่มวนจนรูปหมด
   ══════════════════════════════════════════════ */
const _PDF = {
  M : 12, W : 210, H : 297,
  get CW() { return this.W - this.M * 2; },
  get CH() { return this.H - this.M * 2; }
};

/* ══ โหลดรูปจาก IndexedDB → dataURL (กรองโลโก้ออก) ══ */
async function loadPhotoDataURLs(sheetId) {
  try {
    const meta = await getMeta(sheetId);
    const ids  = meta?.imgIds || [];
    if (!ids.length) return [];
    /* ★ กรอง ID ที่เป็นโลโก้ออก ★ */
    const photoIds = ids.filter(id =>
      !id.toLowerCase().includes('logo') &&
      !id.toLowerCase().includes('header') &&
      !id.toLowerCase().includes('brand')
    );
    console.log(
      `[loadPhotoDataURLs] sheetId=${sheetId}`,
      `total=${ids.length}`,
      `afterFilter=${photoIds.length}`,
      `filteredOut=${ids.length - photoIds.length}`
    );
    return (await Promise.all(photoIds.map(async imgId => {
      try {
        const blob = await dbGetBlob(imgId);
        if (!blob) return null;
        return await new Promise(res => {
          const url = URL.createObjectURL(blob);
          const img = new Image();
          const t   = setTimeout(() => {
            URL.revokeObjectURL(url); res(null);
          }, 8000);
          img.onload = () => {
            clearTimeout(t);
            URL.revokeObjectURL(url);
            try {
              /* ★ กรองรูปที่มีสัดส่วนผิดปกติ (โลโก้มักกว้างมาก) ★ */
              const ratio = img.naturalWidth / img.naturalHeight;
              if (ratio > 5 || ratio < 0.2) { res(null); return; }
              const MAX = 1200;
              const sc  = Math.min(1, MAX / Math.max(img.naturalWidth, img.naturalHeight));
              const c   = document.createElement('canvas');
              c.width   = Math.round(img.naturalWidth  * sc);
              c.height  = Math.round(img.naturalHeight * sc);
              c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
              res(c.toDataURL('image/jpeg', 0.80));
            } catch { res(null); }
          };
          img.onerror = () => {
            clearTimeout(t);
            URL.revokeObjectURL(url);
            res(null);
          };
          img.src = url;
        });
      } catch { return null; }
    }))).filter(Boolean);
  } catch { return []; }
}

/* ══════════════════════════════════════════════
   splitBatches — แบ่ง array เป็น batch ≤ size
   ★ ทำก่อนเสมอ ก่อนส่งให้ calcGrid ★
   ══════════════════════════════════════════════ */
function splitBatches(arr, size) {
  const out = [];
  for (let i = 0; i < arr.length; i += size)
    out.push(arr.slice(i, i + size));
  return out;
}

/* ══════════════════════════════════════════════
   calcGrid — คำนวณ layout ของ 1 batch
   n ต้องเป็น ≤ MAX_P (12) เสมอ
   รักษาสัดส่วน 4:3
   ══════════════════════════════════════════════ */
function calcGrid(n, areaW, areaH) {
  const GAP   = 3;
  const RATIO = 3 / 4;
  let best = null, bestArea = 0;
  for (let cols = 1; cols <= Math.min(n, 4); cols++) {
    const rows   = Math.ceil(n / cols);
    const cw     = (areaW - GAP * (cols - 1)) / cols;
    const ch     = cw * RATIO;
    const totalH = rows * ch + (rows - 1) * GAP;   /* ★ แก้ * ★ */
    if (totalH > areaH) continue;
    const area = cw * ch;
    if (area > bestArea) { bestArea = area; best = { cols, cw, ch, gap: GAP }; }
  }
  /* fallback: 4 cols แล้ว scale ลง */
  if (!best) {
    const cols   = Math.min(n, 4);
    const rows   = Math.ceil(n / cols);
    const gap    = GAP;
    let   cw     = (areaW - gap * (cols - 1)) / cols;
    let   ch     = cw * RATIO;
    const totalH = rows * ch + (rows - 1) * gap;   /* ★ แก้ * ★ */
    if (totalH > areaH) { const s = areaH / totalH; cw *= s; ch *= s; }
    best = { cols, cw, ch, gap };
  }
  return best;
}

/* ══════════════════════════════════════════════
   drawOneBatch — วาด 1 batch (≤ 12) ลงในพื้นที่
   center แนวตั้งใน areaH
   ══════════════════════════════════════════════ */
function drawOneBatch(pdf, batch, startY, areaH) {
  if (!batch.length) return;
  const M  = _PDF.M;
  const PW = _PDF.CW;
  const { cols, cw, ch, gap } = calcGrid(batch.length, PW, areaH);
  const rows  = Math.ceil(batch.length / cols);
  const gridH = rows * ch + (rows - 1) * gap;      /* ★ แก้ * ★ */
  const baseY = startY + Math.max(0, (areaH - gridH) / 2);
  let x = M, y = baseY, col = 0;
  batch.forEach(durl => {
    if (durl) {
      pdf.addImage(durl, 'JPEG', x, y, cw, ch, undefined, 'FAST');
    } else {
      pdf.setFillColor(220, 220, 220);
      pdf.rect(x, y, cw, ch, 'F');
    }
    col++;
    if (col >= cols) { col = 0; x = M; y += ch + gap; }
    else x += cw + gap;
  });
}

/* ══════════════════════════════════════════════
   placePhotos — จุดเดียวที่เรียกใช้งาน
   รับรูปทั้งหมด → นับ → ถ้าเกิน maxPerPage
   → สร้างหน้าเปล่า → วางรูปที่เหลือ → วนจนหมด
   ══════════════════════════════════════════════ */
function placePhotos(pdf, dataURLs, startY, areaH, maxPerPage = 12) {
  if (!dataURLs.length) return;
  /* ★ แบ่ง batch ตาม maxPerPage → วนจนรูปหมด ★ */
  const batches = splitBatches(dataURLs, maxPerPage);
  batches.forEach((batch, bi) => {
    if (bi === 0) {
      /* batch แรก → วางในพื้นที่ปัจจุบัน */
      drawOneBatch(pdf, batch, startY, areaH);
    } else {
      /* ★ รูปเกิน → สร้างหน้าเปล่า → วางรูปที่เหลือ ★ */
      pdf.addPage();
      drawOneBatch(pdf, batch, _PDF.M, _PDF.CH);  /* ★ แก้ space ผิด ★ */
    }
    console.log(
      `[placePhotos] batch ${bi + 1}/${batches.length}`,
      `รูป ${batch.length} ใบ`,
      bi === 0 ? '(หน้าปัจจุบัน)' : '(หน้าเปล่าใหม่)'
    );
  });
}

/* ══ Core: sheetToPDF ══ */
async function sheetToPDF(pdf, el, sheetId) {
  const SHEET_W = 794;
  const MAX_C   = 6;   /* รูปสูงสุดร่วมกับ content */
  const MAX_P   = 12;  /* รูปสูงสุดต่อหน้ารูปล้วน  */
  const M       = _PDF.M;
  const PW      = _PDF.CW;
  const prev    = el.getAttribute('style') || '';
  el.style.cssText +=
    `;width:${SHEET_W}px;min-width:${SHEET_W}px;overflow:visible;`;
  try {
    const [cContent, allDataURLs] = await Promise.all([
      elToCanvas(el, SHEET_W),
      loadPhotoDataURLs(sheetId)
    ]);
    console.log(`[sheetToPDF] sheetId=${sheetId} รูปจริง (ไม่รวมโลโก้) = ${allDataURLs.length} รูป`);
    /* ★ แก้ backtick หาย ★ */

    /* ── content เต็มกว้าง ชิดซ้าย-บน ── */
    const contentW = PW;
    const contentH = Math.min(
      (cContent.height / cContent.width) * contentW, _PDF.CH
    );
    pdf.addImage(
      cContent.toDataURL('image/jpeg', 0.92), 'JPEG',
      M, M, contentW, contentH
    );

    if (!allDataURLs.length) return;

    /* ── แบ่งรูปชุดแรก ≤ MAX_C และที่เหลือ ── */
    const batch1 = allDataURLs.slice(0, MAX_C);
    const rest   = allDataURLs.slice(MAX_C);
    const afterY = M + contentH;
    const spaceH = _PDF.H - M - afterY;

    /* ── ลอง fit batch1 ในหน้าเดียวกับ content ── */
    const g1     = calcGrid(batch1.length, PW, spaceH - 4);
    const rows1  = Math.ceil(batch1.length / g1.cols);
    const gridH1 = rows1 * g1.ch + (rows1 - 1) * g1.gap;  /* ★ แก้ * ★ */

    if (gridH1 <= spaceH - 4) {
      /* ✅ พอดี → วางใต้ content
         ★ placePhotos วนสร้างหน้าเปล่าเองถ้าเกิน ★ */
      placePhotos(pdf, batch1, afterY + 4, spaceH - 4, MAX_C);
    } else {
      /* ❌ ไม่พอ → สร้างหน้าเปล่า → วาง
         ★ placePhotos วนสร้างหน้าเปล่าเองถ้าเกิน ★ */
      pdf.addPage();
      placePhotos(pdf, batch1, M, _PDF.CH, MAX_P);
    }

    /* ── rest: นับรูปที่เหลือ → สร้างหน้าเปล่าวนจนรูปหมด ── */
    if (rest.length) {
      /* ★ ใช้ while loop นับรูปที่เหลือ
         ถ้าเกิน MAX_P → ตัด MAX_P → สร้างหน้าเปล่า → วาด
         วนซ้ำจนรูปหมด ★ */
      let remaining = [...rest];
      while (remaining.length > 0) {
        const chunk = remaining.splice(0, MAX_P);
        pdf.addPage();                        /* ★ สร้างหน้าเปล่า ★ */
        drawOneBatch(pdf, chunk, M, _PDF.CH); /* ★ วางรูปที่เหลือ ★ */
        console.log(
          `[rest] วาด ${chunk.length} รูป`,
          `เหลืออีก ${remaining.length} รูป`,
          remaining.length > 0 ? '→ จะสร้างหน้าเปล่าเพิ่ม' : '→ รูปหมดแล้ว ✅'
        );
      }
    }

  } finally {
    el.setAttribute('style', prev);
  }
}

/* ══ buildAllSheetsPDF ══ */
async function buildAllSheetsPDF() {
  if (!window.jspdf) throw new Error('no jspdf');
  const { jsPDF } = window.jspdf;
  const pdf   = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  let   first = true;
  for (let i = 0; i < sheetIds.length; i++) {
    const id    = sheetIds[i];
    const label = id === 'summary' ? 'Summary' : 'No.' + id.replace('no-', '');
    showProgress(
      `กำลังสร้าง ${i+1}/${sheetIds.length} — ${label}`,
      Math.round(i / sheetIds.length * 90)
    );
    const pg = document.getElementById('pg-' + id);
    if (!pg) continue;
    const wasOn = pg.classList.contains('on');
    if (!wasOn) {
      pg.style.display    = 'block';
      pg.style.position   = 'fixed';
      pg.style.left       = '-9999px';
      pg.style.top        = '0';
      pg.style.zIndex     = '-1';
      pg.style.background = '#fff';
    }
    await new Promise(r => requestAnimationFrame(r));
    try {
      const el = document.getElementById('pdfarea-' + id) || pg;
      if (!first) pdf.addPage();
      first = false;
      await sheetToPDF(pdf, el, id);
    } catch (e) {
      console.warn('err:', id, e);
    } finally {
      if (!wasOn) {
        ['display','position','left','top','zIndex','background']
          .forEach(p => pg.style[p] = '');
      }
    }
  }
  showProgress('เสร็จ!', 100);
  await new Promise(r => setTimeout(r, 100));
  hideProgress();
  return pdf;
}

/* ══ doExportPDF ══ */
async function doExportPDF(id) {
  if (!window.jspdf) { toast('ไม่พบไลบรารี jsPDF'); return; }
  const { jsPDF } = window.jspdf;
  if (id === 'summary') {
    try {
      toast('⏳ กำลังสร้าง PDF รวม…', 60000);
      const pdf = await buildAllSheetsPDF();
      pdf.save(getExportFilename() + '.pdf');
      toast('✅ Export สำเร็จ!');
    } catch {
      hideProgress();
      toast('เกิดข้อผิดพลาด กรุณาลองใหม่');
    }
    return;
  }
  toast('⏳ กำลัง Export…', 15000);
  const pg = document.getElementById('pg-' + id);
  if (!pg) { toast('ไม่พบข้อมูล'); return; }
  const wasOn = pg.classList.contains('on');
  if (!wasOn) {
    pg.style.display    = 'block';
    pg.style.position   = 'fixed';
    pg.style.left       = '-9999px';
    pg.style.top        = '0';
    pg.style.zIndex     = '-1';
    pg.style.background = '#fff';
  }
  try {
    await new Promise(r => requestAnimationFrame(r));
    const el  = document.getElementById('pdfarea-' + id) || pg;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    await sheetToPDF(pdf, el, id);
    pdf.save(`${getExportFilename()}_No${id.replace('no-','')}.pdf`);
    /* ★ แก้ backtick หาย ★ */
    toast('✅ Export PDF สำเร็จ!');
  } catch {
    toast('เกิดข้อผิดพลาด กรุณาลองใหม่');
  } finally {
    if (!wasOn) {
      ['display','position','left','top','zIndex','background']
        .forEach(p => pg.style[p] = '');
    }
  }
}
window.exportPDF = doExportPDF;

/* ══ doSharePDF ══ */
async function doSharePDF(id) {
  if (!window.jspdf) { toast('ไม่พบไลบรารี jsPDF'); return; }
  const { jsPDF } = window.jspdf;
  const buildOne = async id => {
    const pg = document.getElementById('pg-' + id);
    if (!pg) return null;
    const wasOn = pg.classList.contains('on');
    if (!wasOn) {
      pg.style.display    = 'block';
      pg.style.position   = 'fixed';
      pg.style.left       = '-9999px';
      pg.style.top        = '0';
      pg.style.zIndex     = '-1';
      pg.style.background = '#fff';
    }
    try {
      await new Promise(r => requestAnimationFrame(r));
      const el  = document.getElementById('pdfarea-' + id) || pg;
      const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      await sheetToPDF(pdf, el, id);
      return pdf;
    } finally {
      if (!wasOn) {
        ['display','position','left','top','zIndex','background']
          .forEach(p => pg.style[p] = '');
      }
    }
  };
  const share = async (pdf, fname) => {
    const blob = pdf.output('blob');
    const file = new File([blob], fname, { type: 'application/pdf' });
    if (navigator.canShare?.({ files: [file] })) {
      await navigator.share({ files: [file] });
      toast('✅ Share สำเร็จ!');
    } else {
      const a = Object.assign(document.createElement('a'),
        { href: URL.createObjectURL(blob), download: fname });
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 3000);
      toast('📥 บันทึก PDF');
    }
  };
  if (id === 'summary') {
    try {
      toast('⏳ กำลังเตรียม Share…', 60000);
      const pdf = await buildAllSheetsPDF();
      await share(pdf, getExportFilename() + '.pdf');
    } catch (e) {
      hideProgress();
      toast(e?.name === 'AbortError' ? 'ยกเลิก Share' : 'เกิดข้อผิดพลาด กรุณาลองใหม่');
    }
    return;
  }
  toast('⏳ กำลังเตรียม Share…', 15000);
  try {
    const pdf = await buildOne(id);
    if (!pdf) { toast('ไม่พบข้อมูล'); return; }
    await share(pdf, `${getExportFilename()}_No${id.replace('no-','')}.pdf`);
  } catch (e) {
    toast(e?.name === 'AbortError' ? 'ยกเลิก Share' : 'เกิดข้อผิดพลาด กรุณาลองใหม่');
  }
}
window.sharePDF = doSharePDF;

        >${savedTitle}</textarea>
      </div>
      <div style="margin-bottom:14px">
        <label class="fl">👤 ผู้ตรวจ</label>
        <input id="summaryInspectorBox" type="text" class="fi"

/* ══ Rebuild Grid ══ */
async function rebuildGrid(id) {
  const grid = document.getElementById('grid-' + id);
  const cnt = document.getElementById('pcnt-' + id);
  if (!grid) return;
  const m = await getMeta(id);
  const imgIds = m.imgIds || [];
  grid.innerHTML = '';
  const cells = [];
  imgIds.forEach((iid, i) => {
    const cell = document.createElement('div');
    cell.className = 'pcell';
    cell.id = 'cell-' + iid;
    // ✅ แก้ไข #1: เพิ่ม = ให้ innerHTML
    cell.innerHTML = `<div class="pcell-loading" style="width:100%;height:100%">⏳</div>`;
    grid.appendChild(cell);
    cells.push({ iid, i, cell });
  });
  if (cnt) cnt.textContent = imgIds.length + ' รูป';
  for (const { iid, i, cell } of cells) {
    const thumb = await buildCompositeAsync(iid);
    if (!thumb) { cell.remove(); continue; }
    const ann = !!(await loadAnnot(iid));
    // ✅ แก้ไข #2: เพิ่ม ? ใน ternary
    const badge = ann ? `<span style="position:absolute;top:3px;left:3px;background:var(--g);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;">✏️</span>` : '';
    cell.innerHTML = `<img src="${thumb}" onclick="lbOpen('${id}',${i})" loading="lazy"/>
      ${badge}
      <button class="pdel" onclick="delPhoto('${id}','${iid}',event)">✕</button>
      <button class="pedit" onclick="openEditor('${id}','${iid}',event)">✏️</button>`;
  }
}

function scrollToActiveTab(forceInstant = false) {
  requestAnimationFrame(() => {
    const track = document.querySelector('.twrap');
    const activeTab = document.querySelector('#tabs .tab.on');
    if (!track || !activeTab) return;

    const trackRect = track.getBoundingClientRect();
    const tabRect = activeTab.getBoundingClientRect();
    const targetLeft = track.scrollLeft + (tabRect.left - trackRect.left) - ((track.clientWidth - activeTab.clientWidth) / 2);
    const maxLeft = Math.max(0, track.scrollWidth - track.clientWidth);
    const left = Math.max(0, Math.min(targetLeft, maxLeft));

    track.scrollTo({
      left,
      behavior: forceInstant ? 'auto' : 'smooth'
    });
  });
}

/* ══ Render ══ */
async function renderAll() {
  const zone = document.getElementById('zone');
  zone.innerHTML = '';
  for (const id of sheetIds) {
    const div = document.createElement('div');
    div.id = 'pg-' + id;
    div.className = 'pg' + (id === active ? ' on' : '');
    div.innerHTML = id === 'summary' ? await buildSummaryAsync() : await buildSheetPageAsync(id);
    zone.appendChild(div);
    if (id !== 'summary') rebuildGrid(id);
  }
  renderTabs();
}

// ✅ แก้ไข #8: เปลี่ยน forEach async → for...of เพื่อให้ await ทำงานถูกต้อง
async function renderTabs() {
  const wrap = document.getElementById('tabs');
  wrap.innerHTML = '';
  for (const id of sheetIds) {
    const m = await getMeta(id);
    const res = m.result || '';
    const t = document.createElement('div');
    t.className = 'tab' + (id === active ? ' on' : '');
    let label = id === 'summary' ? '📊 Summary' : 'No.' + id.replace('no-', '');
    if (id !== 'summary' && m.location)
      label = m.location.length > 10 ? m.location.slice(0, 9) + '…' : m.location;
    t.innerHTML = label + (res && id !== 'summary'
      ? `<span class="tdot ${res === 'pass' ? 'p' : 'f'}"></span>` : '');
    t.onclick = () => switchTo(id);
    wrap.appendChild(t);
  }
  setTimeout(() => scrollToActiveTab(true), 50);
}

async function switchTo(id) {
  active = id;
  document.querySelectorAll('.pg').forEach(p =>
    p.classList.toggle('on', p.id === 'pg-' + id)
  );
  renderTabs();
  scrollToActiveTab();
  if (id === 'summary') {
    const hp = document.getElementById('pg-summary');
    if (hp) hp.innerHTML = await buildSummaryAsync();
  }
}

function refreshDot(id) { renderTabs(); }

window.setRes = async function(id, val, btn) {
  const m = await getMeta(id);
  const newResult = (m.result === val) ? '' : val;
  let newDate = m.date;
  if (newResult) {
    if (!m.date) newDate = nowDTL();
  } else {
    newDate = '';
  }
  await setMeta(id, { result: newResult, date: newDate });
  // ✅ แก้ไข #4: แก้ querySelector ให้ใช้ () แทน tagged template และลบ ) เกิน
  const dateInput = document.querySelector(`#pg-${id} input[type="datetime-local"]`);
  if (dateInput) dateInput.value = newDate;
  btn.closest('.rg').querySelectorAll('.rb').forEach(b => b.classList.remove('on'));
  if (newResult) {
    btn.classList.add('on');
    toast(newResult === 'pass' ? '✅ ผ่าน' : '❌ ไม่ผ่าน');
  } else {
    toast('↩️ ยกเลิกผลการตรวจแล้ว');

  showSaving(id);
};

/* ══ Lightbox ══ */
let lbId = '', lbIdx = 0, lbSrcs = [], lbIids = [];

window.lbOpen = async function(id, idx) {
  lbId = id;
  const m = await getMeta(id);
  lbIids = m.imgIds || [];
  if (!lbIids.length) return;
  lbSrcs = (await Promise.all(lbIids.map(k => loadImg(k)))).filter(Boolean);
  lbIdx = Math.min(idx, lbSrcs.length - 1);
  lbRender();
  document.getElementById('lb').classList.add('on');
  const c = await Promise.all(lbIids.map(k => buildCompositeAsync(k)));
  lbSrcs = c.filter(Boolean);
  lbIdx = Math.min(lbIdx, lbSrcs.length - 1);
  lbRender();
};

function lbRender() {
  document.getElementById('lbImg').src = lbSrcs[lbIdx] || '';
  // ✅ แก้ไข #3: เพิ่ม = ให้ textContent
  document.getElementById('lbCnt').textContent = `${lbIdx + 1} / ${lbSrcs.length}`;
  const multi = lbSrcs.length > 1;
  document.getElementById('lbL').style.display = multi ? 'flex' : 'none';
  document.getElementById('lbR').style.display = multi ? 'flex' : 'none';
  const strip = document.getElementById('lbStrip');
  strip.innerHTML = '';
  if (multi) {
    lbSrcs.forEach((s, i) => {
      const th = document.createElement('img');
      th.className = 'lb-th' + (i === lbIdx ? ' on' : '');
      th.src = s;
      th.onclick = () => { lbIdx = i; lbRender(); };
      strip.appendChild(th);
      if (i === lbIdx) setTimeout(() => th.scrollIntoView({ inline: 'center', behavior: 'smooth' }), 30);
    });
  }
}

window.lbNav = function(d) { lbIdx = (lbIdx + d + lbSrcs.length) % lbSrcs.length; lbRender(); };
window.lbClose = function() {
  document.getElementById('lb').classList.remove('on');
  document.getElementById('lbImg').src = '';
  lbSrcs = []; lbIids = [];
};
window.lbDL = function() {
  if (!lbSrcs[lbIdx]) return;
  const a = document.createElement('a');
  a.href = lbSrcs[lbIdx];
  a.download = 'SCGP_Boiler_' + (lbIdx + 1) + '.jpg';
  a.click();
  toast('⬇️ บันทึกรูปแล้ว');
};
window.lbEditCurrent = function() {
  const iid = lbIids[lbIdx];
  if (!iid) return;
  lbClose();
  setTimeout(() => openEditorById(lbId, iid), 100);
};

/* ══ Photo Editor ══ */
const imageCanvas = document.getElementById('imageCanvas');
const annotCanvas = document.getElementById('annotCanvas');
let edSheetId = '', edImgId = '', edTool = 'draw', edColor = '#ff3c00', edSize = 5;
let edDrawing = false, edAnnotHistory = [], edStartX = 0, edStartY = 0, edSnapshotData = null;
let edNumCount = 1, edCurrSym = '✅', edTxtActive = false;
const COLORS = ['#ff3c00', '#ffdd00', '#00cc55', '#1565c0', '#fff', '#000', '#ff69b4', '#00bcd4'];

window.openEditor = function(id, iid, e) { if (e) e.stopPropagation(); openEditorById(id, iid); };

async function openEditorById(id, iid) {
  const src = await loadImg(iid);
  if (!src) { toast('ไม่พบรูปภาพ'); return; }
  edSheetId = id; edImgId = iid; edAnnotHistory = []; edNumCount = 1;
  edTool = 'draw'; edColor = '#ff3c00'; edSize = 5;
  const wrap = document.getElementById('edWrap');
  const img = new Image();
  img.onload = async () => {
    const maxW = wrap.clientWidth || window.innerWidth;
    const maxH = wrap.clientHeight || (window.innerHeight - 160);
    let w = img.width, h = img.height;
    const r = w / h;
    if (w > maxW) { w = maxW; h = Math.round(w / r); }
    if (h > maxH) { h = maxH; w = Math.round(h * r); }
    imageCanvas.width = w; imageCanvas.height = h;
    imageCanvas.style.width = w + 'px'; imageCanvas.style.height = h + 'px';
    imageCanvas.getContext('2d').drawImage(img, 0, 0, w, h);
    annotCanvas.width = w; annotCanvas.height = h;
    annotCanvas.style.width = w + 'px'; annotCanvas.style.height = h + 'px';
    annotCanvas.getContext('2d').clearRect(0, 0, w, h);
    const ea = await loadAnnot(iid);
    if (ea) {
      const ai = new Image();
      ai.onload = () => { annotCanvas.getContext('2d').drawImage(ai, 0, 0, w, h); pushAnnotHistory(); };
      ai.onerror = () => pushAnnotHistory();
      ai.src = ea;
    } else pushAnnotHistory();
    setTool('draw');
    initEdColors();
    document.getElementById('edSize').value = 5;
    document.getElementById('editor').classList.add('on');
  };
  img.src = src;
}

function initEdColors() {
  const wrap = document.getElementById('edColors');
  wrap.innerHTML = '';
  COLORS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'ed-color' + (c === edColor ? ' on' : '');
    b.style.background = c;
    b.style.border = c === '#fff' ? '3px solid #555' : '3px solid transparent';
    b.onclick = () => {
      edColor = c;
      wrap.querySelectorAll('.ed-color').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
    };
    wrap.appendChild(b);
  });
}

window.setTool = function(t) {
  edTool = t; hideTxtOverlay(); closeSymPicker();
  document.querySelectorAll('.ed-tool').forEach(el => el.classList.remove('on'));
  const map = { draw: 'etDraw', arrow: 'etArrow', rect: 'etRect', circle: 'etCircle', line: 'etLine', text: 'etText', number: 'etNum', symbol: 'etSym' };
  const el = document.getElementById(map[t]);
  if (el) el.classList.add('on');
};

window.toggleSymPicker = function() {
  document.getElementById('symPicker').classList.toggle('on');
  if (document.getElementById('symPicker').classList.contains('on')) setTool('symbol');
};
function closeSymPicker() { document.getElementById('symPicker').classList.remove('on'); }
window.setSym = function(s) { edCurrSym = s; closeSymPicker(); setTool('symbol'); };

function getPos(e, cvs) {
  const r = cvs.getBoundingClientRect();
  const sx = cvs.width / r.width, sy = cvs.height / r.height;
  let cx, cy;
  if (e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
  else { cx = e.clientX; cy = e.clientY; }
  return { x: (cx - r.left) * sx, y: (cy - r.top) * sy };
}

function pushAnnotHistory() {
  const ctx = annotCanvas.getContext('2d');
  edAnnotHistory.push(ctx.getImageData(0, 0, annotCanvas.width, annotCanvas.height));
  if (edAnnotHistory.length > 30) edAnnotHistory.shift();
}

window.edUndo = function() {
  if (edAnnotHistory.length <= 1) { toast('ไม่มีอะไรให้ย้อนกลับ'); return; }
  edAnnotHistory.pop();
  annotCanvas.getContext('2d').putImageData(edAnnotHistory[edAnnotHistory.length - 1], 0, 0);
};

window.edClearAnnot = function() {
  if (!confirm('ล้าง annotation?')) return;
  annotCanvas.getContext('2d').clearRect(0, 0, annotCanvas.width, annotCanvas.height);
  edAnnotHistory = [edAnnotHistory[0]];
  edNumCount = 1;
  toast('🗑️ ล้างแล้ว');
};

function edPointerDown(e) {
  e.preventDefault(); hideTxtOverlay();
  const pos = getPos(e, annotCanvas);
  edStartX = pos.x; edStartY = pos.y; edDrawing = true;
  const ctx = annotCanvas.getContext('2d'); applyStyle(ctx);
  if (edTool === 'draw') { ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
  else if (edTool === 'text') { edDrawing = false; showTxtOverlay(pos.x, pos.y); }
  else if (edTool === 'number') { drawNumber(ctx, pos.x, pos.y); pushAnnotHistory(); edDrawing = false; }
  else if (edTool === 'symbol') { drawSymbol(ctx, pos.x, pos.y); pushAnnotHistory(); edDrawing = false; }
  else edSnapshotData = ctx.getImageData(0, 0, annotCanvas.width, annotCanvas.height);
}

function edPointerMove(e) {
  if (!edDrawing) return;
  e.preventDefault();
  const pos = getPos(e, annotCanvas);
  const ctx = annotCanvas.getContext('2d'); applyStyle(ctx);
  if (edTool === 'draw') { ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
  else if (['rect', 'circle', 'line', 'arrow'].includes(edTool)) {
    ctx.putImageData(edSnapshotData, 0, 0);
    drawShape(ctx, edTool, edStartX, edStartY, pos.x, pos.y);
  }
}

function edPointerUp(e) {
  if (!edDrawing) return;
  e.preventDefault(); edDrawing = false;
  const pos = getPos(e, annotCanvas);
  const ctx = annotCanvas.getContext('2d'); applyStyle(ctx);
  if (['rect', 'circle', 'line', 'arrow'].includes(edTool)) {
    ctx.putImageData(edSnapshotData, 0, 0);
    drawShape(ctx, edTool, edStartX, edStartY, pos.x, pos.y);
  }
  pushAnnotHistory();
}

function applyStyle(ctx) {
  ctx.strokeStyle = edColor; ctx.fillStyle = edColor;
  ctx.lineWidth = parseInt(document.getElementById('edSize').value) || 5;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
}

function drawShape(ctx, tool, x1, y1, x2, y2) {
  ctx.beginPath();
  if (tool === 'rect') ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
  else if (tool === 'circle') {
    const rx = Math.abs(x2 - x1) / 2, ry = Math.abs(y2 - y1) / 2;
    ctx.ellipse(x1 + (x2 - x1) / 2, y1 + (y2 - y1) / 2, rx, ry, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  else if (tool === 'line') { ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke(); }
  else if (tool === 'arrow') drawArrow(ctx, x1, y1, x2, y2);
}

function drawArrow(ctx, x1, y1, x2, y2) {
  const ang = Math.atan2(y2 - y1, x2 - x1), hl = 18;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hl * Math.cos(ang - Math.PI / 7), y2 - hl * Math.sin(ang - Math.PI / 7));
  ctx.lineTo(x2 - hl * Math.cos(ang + Math.PI / 7), y2 - hl * Math.sin(ang + Math.PI / 7));
  ctx.closePath(); ctx.fill();
}

function drawNumber(ctx, x, y) {
  const sz = parseInt(document.getElementById('edSize').value) * 4 + 16;
  // ✅ แก้ไข #5: เพิ่ม = ให้ ctx.font
  ctx.font = `bold ${sz}px Arial`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillText(String(edNumCount), x + 2, y + 2);
  ctx.fillStyle = edColor;
  ctx.fillText(String(edNumCount), x, y);
  edNumCount++;
}

function drawSymbol(ctx, x, y) {
  const sz = parseInt(document.getElementById('edSize').value) * 4 + 20;
  // ✅ แก้ไข #6: เพิ่ม = ให้ ctx.font
  ctx.font = `${sz}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(edCurrSym, x, y);
}

function showTxtOverlay(cx, cy) {
  const ov = document.getElementById('txtOverlay'), inp = document.getElementById('edTxtInput');
  const r = annotCanvas.getBoundingClientRect(), wr = annotCanvas.parentElement.getBoundingClientRect();
  const sx = r.width / annotCanvas.width, sy = r.height / annotCanvas.height;
  ov.style.left = (cx * sx - 10 + (r.left - wr.left)) + 'px';
  ov.style.top = (cy * sy - 14 + (r.top - wr.top)) + 'px';
  ov.style.display = 'block';
  inp.style.fontSize = (parseInt(document.getElementById('edSize').value) * 3 + 14) + 'px';
  inp.style.color = edColor; inp.value = ''; inp.style.height = 'auto';
  edTxtActive = true; setTimeout(() => inp.focus(), 50);
}

function hideTxtOverlay() { commitText(); document.getElementById('txtOverlay').style.display = 'none'; edTxtActive = false; }

function commitText() {
  if (!edTxtActive) return;
  const inp = document.getElementById('edTxtInput');
  const txt = inp.value.trim(); if (!txt) return;
  const ctx = annotCanvas.getContext('2d');
  const r = annotCanvas.getBoundingClientRect();
  const ov = document.getElementById('txtOverlay');
  const oL = parseFloat(ov.style.left) + 10, oT = parseFloat(ov.style.top) + 14;
  const sx = annotCanvas.width / r.width, sy = annotCanvas.height / r.height;
  const sz = parseInt(document.getElementById('edSize').value) * 3 + 14;
  ctx.font = `bold ${sz}px Arial`;
  ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  inp.value.split('\n').forEach((line, i) => {
    const px = oL * sx, py = (oT + i * (sz + 4)) * sy;
    ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillText(line, px + 2, py + 2);
    ctx.fillStyle = edColor; ctx.fillText(line, px, py);
  });
  pushAnnotHistory();
}

window.autoResizeTxt = function(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; };
window.txtKeyDown = function(e) { if (e.key === 'Escape') hideTxtOverlay(); };

annotCanvas.addEventListener('mousedown', edPointerDown);
annotCanvas.addEventListener('mousemove', edPointerMove);
annotCanvas.addEventListener('mouseup', edPointerUp);
annotCanvas.addEventListener('touchstart', edPointerDown, { passive: false });
annotCanvas.addEventListener('touchmove', edPointerMove, { passive: false });
annotCanvas.addEventListener('touchend', edPointerUp, { passive: false });

window.edCancel = function() { document.getElementById('editor').classList.remove('on'); hideTxtOverlay(); };
window.edSaveDone = async function() {
  hideTxtOverlay();
  await new Promise(r => setTimeout(r, 80));
  const actx = annotCanvas.getContext('2d');
  const data = actx.getImageData(0, 0, annotCanvas.width, annotCanvas.height).data;
  const has = data.some(v => v !== 0);
  if (has) { await saveAnnot(edImgId, annotCanvas.toDataURL('image/png')); }
  else await delAnnot(edImgId);
  document.getElementById('editor').classList.remove('on');
  await rebuildGrid(edSheetId);
  showSaving(edSheetId);
  toast('✅ บันทึกรูป+annotation แล้ว');
};

/* ══ Add/Del sheet ══ */
function nextNo() {
  const nums = sheetIds.filter(id => id !== 'summary').map(id => parseInt(id.replace('no-', '')) || 0);
  return nums.length ? Math.max(...nums) + 1 : 1;
}

window.clearAllSheets = async function(){
  const nonS = sheetIds.filter(id => id !== 'summary');
  const total = nonS.length;
  const hasSummary = !!((await dbGet('summary_title')) || (await dbGet('summary_inspector')));
  if (!total && !hasSummary) { toast('⚠️ ไม่มีข้อมูลให้ล้าง'); return; }
  if (!confirm(`ล้างข้อมูลทุก Sheet ทั้งหมด ${total} รายการ รวมถึงข้อมูลหน้า Summary และรูปภาพทั้งหมด?`)) return;
  for (const rid of [...nonS]) {
    const m = await getMeta(rid);
    for (const iid of (m.imgIds || [])) await delImg(iid);
    await delMeta(rid);
  }
  await dbDel('summary_title');
  await dbDel('summary_inspector');
  sheetIds = ['summary'];
  await saveSheetsList(sheetIds);
  active = 'summary';
  await renderAll();
  
  toast('🗑️ ล้างข้อมูลทั้งหมดแล้ว');
};

document.getElementById('btnAdd').onclick = async () => {
  const n = nextNo(), id = 'no-' + n;
  sheetIds.push(id);
  await saveSheetsList(sheetIds);
  active = id;
  await renderAll();
  toast('➕ เพิ่ม Sheet No.' + n);
};

document.getElementById('btnDel').onclick = async () => {
  const nonS = sheetIds.filter(id => id !== 'summary');
  if (!nonS.length) { toast('⚠️ ไม่มี Sheet ที่ลบได้'); return; }
  const rid = active !== 'summary' ? active : nonS[nonS.length - 1];
  // ✅ แก้ไข #7: ลบ ) เกินออกหนึ่งตัว
  if (!confirm(`ลบ Sheet "No.${rid.replace('no-', '')}" และรูปภาพทั้งหมด?`)) return;
  const m = await getMeta(rid);
  for (const iid of (m.imgIds || [])) await delImg(iid);
  await delMeta(rid);
  sheetIds = sheetIds.filter(id => id !== rid);
  await saveSheetsList(sheetIds);
  active = 'summary';
  await renderAll();
  toast('🗑️ ลบ Sheet แล้ว');
};

let _sx = 0;
document.getElementById('lb').addEventListener('touchstart', e => _sx = e.touches[0].clientX, { passive: true });
document.getElementById('lb').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - _sx;
  if (Math.abs(dx) > 45) lbNav(dx < 0 ? 1 : -1);
}, { passive: true });

/* ══ INIT ══ */
async function init() {
  try {
    DB = await openDB();
    sheetIds = await getSheetsList();
    if (!sheetIds.includes('summary')) sheetIds.unshift('summary');
    if (!sheetIds.includes(active)) active = 'summary';
    await renderAll();
    
  } catch (e) {
    console.error(e);
    document.getElementById('zone').innerHTML = '<div style="padding:20px;color:#b42318;font-weight:700">เกิดข้อผิดพลาด กรุณา Refresh</div><div style="padding:0 20px 20px 20px;color:#666;font-size:12px;word-break:break-word">' + (e && (e.message || e)) + '</div>';
  } finally {
    document.getElementById('loadingCover').classList.add('hide');
  }
}
init();
</script>
